services:
  - type: web
    name: deepfake-sentinel-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirement.txt && python preload_models.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000 --timeout-keep-alive 75
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4