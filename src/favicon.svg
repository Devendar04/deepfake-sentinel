<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0E1116"/>

  <!-- Shield body -->
  <path d="M16 4 L26 8 L26 17 Q26 24 16 28 Q6 24 6 17 L6 8 Z"
        fill="#0E1116" stroke="#10b981" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Scan line (horizontal sweep) -->
  <line x1="9" y1="16" x2="23" y2="16" stroke="#10b981" stroke-width="1" opacity="0.4"/>

  <!-- Eye shape in center -->
  <ellipse cx="16" cy="16" rx="5" ry="3.2" fill="none" stroke="#10b981" stroke-width="1.3"/>

  <!-- Pupil -->
  <circle cx="16" cy="16" r="1.6" fill="#10b981"/>

  <!-- Corner scan brackets -->
  <path d="M9 12 L9 10 L11 10" fill="none" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M23 12 L23 10 L21 10" fill="none" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M9 20 L9 22 L11 22" fill="none" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <path d="M23 20 L23 22 L21 22" fill="none" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
</svg>
